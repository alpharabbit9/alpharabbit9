name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: alpharabbit9
          # Monochrome palette matched to the profile theme
          # light mode: dark snake on grey dots · dark mode: white snake on grey dots
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0D0D0D&color_dots=#EBEBEB,#C6C6C6,#9E9E9E,#5C5C5C,#191919
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FFFFFF&color_dots=#1B1B1B,#2A2A2A,#525252,#A3A3A3,#FFFFFF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
